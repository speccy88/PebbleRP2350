syscfg.vals:
    BLE_TRANSPORT_LL: socket
    BLE_SM_IO_CAP: 'BLE_HS_IO_DISPLAY_YESNO'
    BLE_SM_SC_ONLY: 1
    BLE_SM_LEGACY: 0
    BLE_SM_MITM: 1
    BLE_SM_LVL: 4
    # Increased to prevent ACL mbuf allocation failures during high-throughput
    # operations (e.g. FW upgrade over BLE on iOS).
    BLE_TRANSPORT_ACL_COUNT: 60
