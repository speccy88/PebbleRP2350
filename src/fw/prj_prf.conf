# Recovery (PRF) firmware Kconfig overrides.
# Applied on top of prj.conf when building with --variant=prf.

# PRF firmware never reports to Memfault — the recovery image must stay
# minimal and is the fallback used to recover from coredumps.
CONFIG_MEMFAULT=n

# PRF services.
CONFIG_SERVICE_IDLE_WATCHDOG=y

# Recovery firmware identity.
CONFIG_RECOVERY_FW=y
